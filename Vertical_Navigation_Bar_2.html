<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vertical_Navigation_bar_2</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <style>
        *{
            margin: 0px;
            padding: 0px;
        }
        nav{
            background-color: lightpink;
            padding: 20px;
            height: 100vh;
            width: 180px;
        }
        nav h1{
            text-align: center;
            font-size: 25px;
            padding: 20px;
            padding-bottom: 50px;
        }
        nav ul li{
            list-style: none;
            padding: 20px;
            text-align: left;
            font-size: 20px;
            border-bottom: 2px solid black;
        }
        nav ul li a{
            text-decoration: none;
            color: black;
            padding: 0px;
        }
        nav ul li:hover{
            background-color: hotpink;
            color: white;
            border-radius: 5px;
        }
        nav ul li:hover a{
            background-color: hotpink;
        }
    </style>
</head>
<body>
    <nav>
        <h1>My App</h1>
        <ul>
            <li>
                <i class="fa-solid fa-gauge"></i>
                <a href="#">Dashboard</a>
            </li>
            <li>
                <i class="fa-solid fa-bolt"></i>
                <a href="#">Shortcuts</a>
            </li>
            <li>
                <i class="fa-solid fa-eye"></i>
                <a href="#">Overview</a>
            </li>
            <li>
                <i class="fa-solid fa-calendar"></i>
                <a href="#">Events</a>
            </li>
            <li>
                <i class="fa-solid fa-circle-info"></i>
                <a href="#"> About</a>
            </li>
            <li>
                <i class="fa-solid fa-screwdriver-wrench"></i>
                <a href="#">Services</a>
            </li>
            <li>
                <i class="fa-solid fa-address-book"></i>
                <a href="#">Contact</a>
            </li>
        </ul>
    </nav>
</body>
</html>
